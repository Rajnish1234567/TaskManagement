version: '3.8'

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: task-management-app

    ports:
      - "8080:8080"

    depends_on:
      - mongo
      - redis

    environment:
      SPRING_DATA_MONGODB_HOST: mongo
      SPRING_DATA_REDIS_HOST: redis

  mongo:
    image: mongo:7

    container_name: mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine

    container_name: redis

    ports:
      - "6379:6379"

volumes:
  mongo_data:
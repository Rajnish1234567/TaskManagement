<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body">

                    <h3 class="text-center mb-4">
                        Login
                    </h3>

                    <form
                    [formGroup]="loginForm"
                    (ngSubmit)="login()">

                        <div class="mb-3">

                            <label>Email</label>

                            <input
                            class="form-control"
                            type="email"
                            formControlName="email">

                        </div>

                        <div class="mb-3">

                            <label>Password</label>

                            <input
                            class="form-control"
                            type="password"
                            formControlName="password">

                        </div>

                        <button
                        class="btn btn-primary w-100">

                            Login

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>
